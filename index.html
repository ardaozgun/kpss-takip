<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPSS 2026 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="login-view" class="glass-panel active">
        <div class="login-box">
            <h2>KPSS <span>2026</span></h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="Kullanıcı Adı" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Şifre: 1234">
            </div>
            <button class="btn-primary" id="login-btn">Sisteme Giriş Yap</button>
        </div>
    </div>

    <!-- ANA UYGULAMA İSKELETİ -->
    <div id="app-layout" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">✦ KPSS Takip</div>
            <nav class="nav-menu">
                <button class="nav-item active" data-target="videos">🎬 Videolar</button>
                <button class="nav-item" data-target="calc">🧮 Hesapla</button>
                <button class="nav-item" data-target="history">📋 Geçmiş</button>
                <button class="nav-item" data-target="analysis">📊 Analiz</button>
            </nav>
            <div class="sidebar-bottom">
                <button id="theme-toggle" class="btn-secondary">🌓 Tema Değiştir</button>
                <div class="user-info">
                    <span id="user-display">Kullanıcı</span>
                    <button id="logout-btn" class="text-danger">Çıkış</button>
                </div>
            </div>
        </aside>

        <!-- İçerik Alanı -->
        <main class="content-area">
            <div id="videos" class="page active"><h2>Video Modülü Yüklenecek...</h2></div>
            <div id="calc" class="page"><h2>Hesaplama Modülü Yüklenecek...</h2></div>
            <div id="history" class="page"><h2>Geçmiş Modülü Yüklenecek...</h2></div>
            <div id="analysis" class="page"><h2>Analiz Modülü Yüklenecek...</h2></div>
        </main>
    </div>

    <div id="toast"></div>

    <!-- Modüler JS Bağlantısı -->
    <script type="module" src="app.js"></script>
</body>
</html>
